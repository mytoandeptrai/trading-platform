# CI: lint, type-check, test, build on push/PR to develop and main.
# No CD; no PostgreSQL/Redis; uses pnpm + Turbo cache.

name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

defaults:
  run:
    working-directory: .

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint

      - name: Type check
        run: pnpm turbo run check-types

      - name: Test
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build
